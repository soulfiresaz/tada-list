<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Board Debug</title>
    <style>
        body { font-family: Arial; padding: 10px; background: #111; color: #0f0; font-size: 16px; }
        #log { white-space: pre-wrap; line-height: 1.6; }
    </style>
</head>
<body>
    <h2>Board Debug</h2>
    <canvas id="test-canvas" width="400" height="300" style="border:1px solid #0f0;"></canvas>
    <div id="log"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script>
        var log = document.getElementById('log');
        function addLog(msg) { log.textContent += msg + '\n'; }

        try {
            addLog('Step 1: Creating canvas...');
            var canvas = new fabric.Canvas('test-canvas', {
                backgroundColor: '#2a2a4a'
            });
            addLog('Step 2: Canvas created OK');

            addLog('Step 3: Creating To Do label...');
            var todo = new fabric.IText('To Do', {
                left: 50,
                top: 40,
                fontFamily: 'Arial',
                fontSize: 30,
                fill: '#FFD700'
            });
            canvas.add(todo);
            addLog('Step 4: To Do added. Objects on canvas: ' + canvas.getObjects().length);

            addLog('Step 5: Creating divider...');
            var line = new fabric.Line([200, 20, 200, 280], {
                stroke: '#6C6C8A',
                strokeWidth: 3,
                padding: 15
            });
            canvas.add(line);
            addLog('Step 6: Divider added. Objects on canvas: ' + canvas.getObjects().length);

            addLog('Step 7: Creating Ta Da label...');
            var tada = new fabric.IText('Ta Da', {
                left: 250,
                top: 40,
                fontFamily: 'Arial',
                fontSize: 30,
                fill: '#2ED573'
            });
            canvas.add(tada);
            addLog('Step 8: Ta Da added. Objects on canvas: ' + canvas.getObjects().length);

            canvas.renderAll();
            addLog('Step 9: renderAll done. EVERYTHING OK!');

        } catch(e) {
            addLog('ERROR: ' + e.message);
            addLog('Stack: ' + e.stack);
        }
    </script>
</body>
</html>
